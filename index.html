<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Exphil Quiz Pro</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; margin:20px; }
    h1,h2 { text-align:center; }
    .question { background:white; padding:15px; margin:10px auto; max-width:700px; border-radius:10px; }
    button { margin-top:10px; padding:8px 12px; border:none; border-radius:5px; background:#4CAF50; color:white; cursor:pointer; }
    .result { margin-top:8px; font-weight:bold; }
    #score,#timer { text-align:center; font-size:18px; }
  </style>
</head>
<body>

<h1>Exphil Eksamens-Trener</h1>
<div id="timer">Tid: 0s</div>
<div id="score">Poeng: 0</div>
<div id="quiz"></div>
<div style="text-align:center"><button onclick="finishQuiz()">Fullfør test</button></div>
<div id="final"></div>

<script>
let score = 0;
let answered = 0;
let time = 0;

setInterval(()=>{
 time++;
 document.getElementById("timer").innerText = "Tid: "+time+"s";
},1000);

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

const sections = [
{
 title:"Argumentasjon",
 questions: shuffle([
 {q:"Hva er et standpunkt?", options:["Et spørsmål","Konklusjon","Eksempel","Følelse"], answer:1, exp:"Standpunkt = konklusjonen argumentet støtter."},
 {q:"Hva er stråmann?", options:["Sterkt argument","Feilrepresentasjon","Fakta","Metode"], answer:1, exp:"Man forvrenger motpartens syn."},
 {q:"Deduktivt argument betyr?", options:["Sannsynlig","Nødvendig konklusjon","Følelser","Ugyldig"], answer:1, exp:"Konklusjonen følger logisk."},
 {q:"Normativ vs deskriptiv?", options:["Samme","Bør vs er","Følelse","Vitenskap"], answer:1, exp:"Normativ = bør, deskriptiv = er."}
 ])
},
{
 title:"Vitenskapsfilosofi",
 questions: shuffle([
 {q:"Epistemologi er?", options:["Moral","Kunnskap","Politikk","Språk"], answer:1, exp:"Erkjennelsesteori."},
 {q:"Falsifiserbarhet?", options:["Bevises","Motbevises","Føles","Ignoreres"], answer:1, exp:"Teorier må kunne testes og feiles."},
 {q:"Paradigme?", options:["Lov","Modell","Ramme","Eksperiment"], answer:2, exp:"Felles forståelsesramme."},
 {q:"Hypotetisk-deduktiv metode?", options:["Synsing","Test av hypoteser","Følelser","Autoritet"], answer:1, exp:"Hypotese → test → bekreft/avkreft."}
 ])
},
{
 title:"Etikk",
 questions: shuffle([
 {q:"Utilitarisme?", options:["Regler","Konsekvenser","Følelser","Tilfeldig"], answer:1, exp:"Maksimer lykke."},
 {q:"Pliktetikk?", options:["Konsekvens","Regler","Lyst","Flaks"], answer:1, exp:"Følg moralske regler."},
 {q:"Dydsetikk?", options:["Regler","Konsekvenser","Karakter","Tall"], answer:2, exp:"Fokus på dyder."},
 {q:"Moralsk nihilisme?", options:["Alt er sant","Ingen moral finnes","Plikt","Lykke"], answer:1, exp:"Ingen objektiv moral."}
 ])
}
];

const quizDiv = document.getElementById("quiz");

sections.forEach((sec,s)=>{
 let secDiv=document.createElement("div");
 secDiv.innerHTML=`<h2>${sec.title}</h2>`;
 sec.questions.forEach((q,i)=>{
 let div=document.createElement("div");
 div.className="question";
 let html=`<p><b>${q.q}</b></p>`;
 q.options.forEach((opt,idx)=>{
 html+=`<label><input type="radio" name="q${s}_${i}" value="${idx}"> ${opt}</label><br>`;
 });
 html+=`<button onclick="check(${s},${i})">Svar</button>`;
 html+=`<div class="result" id="r${s}_${i}"></div>`;
 div.innerHTML=html;
 secDiv.appendChild(div);
 });
 quizDiv.appendChild(secDiv);
});

function check(s,i){
 let sel=document.querySelector(`input[name=q${s}_${i}]:checked`);
 let res=document.getElementById(`r${s}_${i}`);
 if(!sel){res.innerText="Velg svar";return;}
 let q=sections[s].questions[i];
 if(parseInt(sel.value)===q.answer){
  res.innerText="Riktig ✔ " + q.exp;
  score++;
 } else {
  res.innerText="Feil ❌ " + q.exp;
 }
 answered++;
 document.getElementById("score").innerText="Poeng: "+score;
}

function finishQuiz(){
 let grade="";
 let total=answered;
 let percent=(score/total)*100;
 if(percent>85) grade="A";
 else if(percent>70) grade="B";
 else if(percent>55) grade="C";
 else if(percent>40) grade="D";
 else grade="E/F";
 document.getElementById("final").innerHTML=`<h2>Ferdig!</h2><p>Score: ${score}/${total} (${percent.toFixed(1)}%)</p><p>Karakter: ${grade}</p>`;
}
</script>

</body>
</html>
