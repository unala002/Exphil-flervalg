<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Exphil Quiz Deluxe</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#667eea,#764ba2); margin:0; color:#333; }
.container { max-width:900px; margin:auto; padding:20px; }
h1 { text-align:center; color:white; }
.card { background:white; padding:20px; margin:20px 0; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
button { margin-top:10px; padding:10px 15px; border:none; border-radius:8px; background:#667eea; color:white; cursor:pointer; }
button:hover { background:#5a67d8; }
.result { margin-top:10px; font-weight:bold; }
#score,#timer { text-align:center; color:white; font-size:18px; }
.correct { color:green; }
.wrong { color:red; }
</style>
</head>
<body>
<div class="container">
<h1>Exphil Quiz 🎓</h1>
<div id="timer">Tid: 0s</div>
<div id="score">Poeng: 0</div>
<div id="quiz"></div>
<div style="text-align:center"><button onclick="finishQuiz()">Fullfør test</button></div>
<div id="final"></div>
</div>

<script>
let score = 0;
let answered = 0;
let time = 0;

setInterval(()=>{
 time++;
 document.getElementById("timer").innerText = "Tid: "+time+"s";
},1000);

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

const sections = [
{
 title:"Argumentasjon",
 questions: shuffle([
 {q:"Hva er et standpunkt?", options:["Et spørsmål","En konklusjon som støttes av argumenter","En følelse","Et eksempel"], answer:1, exp:"Standpunkt er hovedpåstanden."},
 {q:"Hva er ad hominem?", options:["Logisk argument","Angrep på person","Faktaargument","Vitenskapelig metode"], answer:1, exp:"Angriper personen, ikke argumentet."},
 {q:"Hva kjennetegner deduktive argumenter?", options:["Gir sannsynlighet","Gir nødvendig konklusjon","Er basert på følelser","Er alltid feil"], answer:1, exp:"Konklusjonen må være sann."}
 ])
},
{
 title:"Vitenskapsfilosofi",
 questions: shuffle([
 {q:"Hva er epistemologi?", options:["Læren om kunnskap","Læren om moral","Læren om politikk","Læren om språk"], answer:0, exp:"Epistemologi = kunnskap."},
 {q:"Hva betyr falsifiserbarhet?", options:["Kan bevises","Kan motbevises","Er sant","Er subjektivt"], answer:1, exp:"Teorien må kunne testes og feile."},
 {q:"Hva er et paradigme?", options:["En metode","En forståelsesramme","En lov","Et eksperiment"], answer:1, exp:"Ramme for forskning."}
 ])
},
{
 title:"Etikk",
 questions: shuffle([
 {q:"Hva avgjør handlinger i utilitarismen?", options:["Regler","Konsekvenser","Følelser","Tradisjon"], answer:1, exp:"Maksimer lykke."},
 {q:"Hva sier pliktetikken?", options:["Følg regler","Se på konsekvenser","Følg følelser","Gjør hva du vil"], answer:0, exp:"Plikt over konsekvens."},
 {q:"Hva fokuserer dydsetikk på?", options:["Handlinger","Konsekvenser","Karakter","Lover"], answer:2, exp:"Dyder og person."}
 ])
}
];

const quizDiv = document.getElementById("quiz");

sections.forEach((sec,s)=>{
 let secDiv=document.createElement("div");
 secDiv.innerHTML=`<h2 style='color:white'>${sec.title}</h2>`;
 sec.questions.forEach((q,i)=>{
 let div=document.createElement("div");
 div.className="card";
 let html=`<p><b>${q.q}</b></p>`;
 q.options.forEach((opt,idx)=>{
 html+=`<label><input type="radio" name="q${s}_${i}" value="${idx}"> ${opt}</label><br>`;
 });
 html+=`<button onclick="check(${s},${i})">Svar</button>`;
 html+=`<div class="result" id="r${s}_${i}"></div>`;
 div.innerHTML=html;
 secDiv.appendChild(div);
 });
 quizDiv.appendChild(secDiv);
});

function check(s,i){
 let sel=document.querySelector(`input[name=q${s}_${i}]:checked`);
 let res=document.getElementById(`r${s}_${i}`);
 if(!sel){res.innerText="Velg svar";return;}
 let q=sections[s].questions[i];
 if(parseInt(sel.value)===q.answer){
  res.innerHTML=`<span class='correct'>Riktig ✔</span><br>${q.exp}`;
  score++;
 } else {
  res.innerHTML=`<span class='wrong'>Feil ❌</span><br>Riktig svar: ${q.options[q.answer]}<br>${q.exp}`;
 }
 answered++;
 document.getElementById("score").innerText="Poeng: "+score;
}

function finishQuiz(){
 let percent=(score/answered)*100;
 let grade="";
 if(percent>85) grade="A";
 else if(percent>70) grade="B";
 else if(percent>55) grade="C";
 else if(percent>40) grade="D";
 else grade="E/F";
 document.getElementById("final").innerHTML=`<div class='card'><h2>Resultat</h2><p>${score}/${answered} (${percent.toFixed(1)}%)</p><p>Karakter: ${grade}</p></div>`;
}
</script>
</body>
</html>
